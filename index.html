<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Buku Keuangan Digital adalah PWA pencatat pemasukan dan penjualan manual dengan rekap otomatis per bulan." />
  <meta name="theme-color" content="#059669" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Buku Keuangan" />
  <title>Buku Keuangan Digital</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Navigasi desktop">
      <a class="brand" href="#dashboard" data-route="dashboard" aria-label="Buku Keuangan Digital">
        <span class="brand-mark">BK</span>
        <span>
          <strong>Buku Keuangan</strong>
          <small>Digital</small>
        </span>
      </a>
      <nav class="side-nav" id="sideNav"></nav>
      <div class="side-panel">
        <span class="side-panel-icon">💾</span>
        <p>Data tersimpan otomatis di browser kamu lewat localStorage. Export rutin untuk backup.</p>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1 id="pageTitle">Dashboard</h1>
        </div>
        <div class="top-actions">
          <select id="monthSelect" class="month-select" aria-label="Pilih bulan aktif"></select>
          <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle dark mode">🌙</button>
        </div>
      </header>

      <section id="viewContainer" class="view-container" aria-live="polite"></section>
    </main>
  </div>

  <button class="fab-add" id="quickAddFab" type="button" aria-label="Catat Penjualan">+ Catat Penjualan</button>
  <nav class="bottom-nav" id="bottomNav" aria-label="Navigasi mobile"></nav>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <input type="file" id="importFile" accept="application/json" hidden />
  <script src="script.js"></script>
</body>
</html>
